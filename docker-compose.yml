services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pvt
      POSTGRES_PASSWORD: pvt
      POSTGRES_DB: pvt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pvt"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://pvt:pvt@db:5432/pvt
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-32-bytes-min}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
